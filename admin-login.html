<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Login — First Global Standard Bank</title>
  <meta name="theme-color" content="#DC2626">
  <link rel="manifest" href="/admin-manifest.json">
  <link rel="apple-touch-icon" href="/icons/admin-icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #DC2626; --red-d: #B91C1C;
      --red-bg: #FEF2F2; --red-br: #FECACA;
      --g50: #F9FAFB; --g100: #F3F4F6; --g200: #E5E7EB;
      --g300: #D1D5DB; --g400: #9CA3AF; --g500: #6B7280;
      --g700: #374151; --g900: #111827;
    }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; min-height: 100dvh;
      background: linear-gradient(160deg, #ffffff 0%, #FEF2F2 55%, #ffffff 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1.25rem;
    }

    .login-card {
      width: 100%; max-width: 340px;
      background: #fff; border-radius: 22px;
      padding: 2rem 1.6rem 1.6rem;
      border: 1px solid var(--red-br);
      box-shadow: 0 20px 50px rgba(220,38,38,.15);
      text-align: center;
    }

    .login-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      margin: 0 auto .9rem; background: #fff;
      border: 3px solid var(--red);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 16px rgba(220,38,38,.3);
      overflow: hidden;
    }
    .login-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
    }

    .login-greeting {
      font-size: 1.05rem; font-weight: 800; color: var(--g900);
    }
    .login-sub {
      font-size: .74rem; color: var(--g500);
      margin-top: .25rem; margin-bottom: 1.4rem;
    }

    .pin-dots {
      display: flex; justify-content: center;
      gap: .8rem; margin-bottom: .5rem;
    }
    .pin-dots.shake { animation: pinShake .42s; }
    @keyframes pinShake {
      10%,90%  { transform: translateX(-2px); }
      20%,80%  { transform: translateX(4px); }
      30%,50%,70% { transform: translateX(-8px); }
      40%,60%  { transform: translateX(8px); }
    }
    .pin-dot {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid var(--g300); background: transparent;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .pin-dot.filled {
      background: #DC2626; border-color: #DC2626; transform: scale(1.1);
    }
    .pin-dot.error {
      background: #FCA5A5; border-color: #FCA5A5;
    }

    .pin-error {
      min-height: 1.1rem; font-size: .68rem; font-weight: 700;
      color: var(--red); opacity: 0; margin-bottom: .4rem;
      transition: opacity .15s;
    }
    .pin-error.show { opacity: 1; }

    .keypad {
      margin-top: 1rem;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .65rem;
    }
    .key {
      font-family: inherit; font-size: 1.15rem; font-weight: 700;
      color: var(--g900);
      background: var(--g50); border: 1px solid var(--g100);
      border-radius: 50%; aspect-ratio: 1; width: 100%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { transform: scale(.92); background: var(--red-bg); }
    .key-ghost {
      font-size: .68rem; font-weight: 700;
      color: var(--g500); background: transparent; border-color: transparent;
    }
    .key-ghost:active { background: var(--g100); }

    .login-foot {
      margin-top: 1.2rem; font-size: .64rem; color: var(--g400);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-avatar">
      <img src="/icons/logo.jpeg" alt="FGSB">
    </div>
    <div class="login-greeting">Welcome back</div>
    <div class="login-sub">Enter your 4-digit PIN to continue</div>

    <div class="pin-dots" id="pinDots">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>
    <div class="pin-error" id="pinError">Incorrect PIN. Try again.</div>

    <div class="keypad">
      <button class="key" onclick="pinPress('1')">1</button>
      <button class="key" onclick="pinPress('2')">2</button>
      <button class="key" onclick="pinPress('3')">3</button>
      <button class="key" onclick="pinPress('4')">4</button>
      <button class="key" onclick="pinPress('5')">5</button>
      <button class="key" onclick="pinPress('6')">6</button>
      <button class="key" onclick="pinPress('7')">7</button>
      <button class="key" onclick="pinPress('8')">8</button>
      <button class="key" onclick="pinPress('9')">9</button>
      <button class="key key-ghost" onclick="pinClear()">Clear</button>
      <button class="key" onclick="pinPress('0')">0</button>
      <button class="key key-ghost" onclick="pinBackspace()" aria-label="Backspace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
          <line x1="18" y1="9" x2="12" y2="15"/>
          <line x1="12" y1="9" x2="18" y2="15"/>
        </svg>
      </button>
    </div>

    <div class="login-foot">FGSB Admin Panel &middot; Secured Access</div>
  </div>

  <script>
    const PIN = '9050';
    let val = '';

    function renderDots() {
      document.querySelectorAll('.pin-dot').forEach((d, i) => {
        d.classList.toggle('filled', i < val.length);
        d.classList.remove('error');
      });
    }

    function showError() {
      document.querySelectorAll('.pin-dot').forEach(d => {
        d.classList.remove('filled');
        d.classList.add('error');
      });
      const dots = document.getElementById('pinDots');
      const err  = document.getElementById('pinError');
      dots.classList.add('shake');
      err.classList.add('show');
      setTimeout(() => {
        dots.classList.remove('shake');
        err.classList.remove('show');
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
        val = '';
        renderDots();
      }, 900);
    }

    function pinPress(n) {
      if (val.length >= 4) return;
      val += n;
      renderDots();
      if (val.length === 4) {
        if (val === PIN) {
          setTimeout(() => { window.location.href = '/admin.html?unlocked=1'; }, 200);
        } else {
          setTimeout(showError, 120);
        }
      }
    }

    function pinClear()     { val = ''; renderDots(); }
    function pinBackspace() { val = val.slice(0, -1); renderDots(); }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') pinPress(e.key);
      else if (e.key === 'Backspace') pinBackspace();
      else if (e.key === 'Escape')    pinClear();
    });
  </script>
</body>
</html>
