<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#ef4444"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Admin Login — First Global Standard Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      background: #1a0202;
      background-image:
        radial-gradient(ellipse 120% 60% at 50% 0%, #6b0c0c 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #3d0606 0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 28px 32px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .logo-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(200,40,40,0.2);
      box-shadow: 0 0 0 8px rgba(220,50,50,0.1), 0 6px 24px rgba(180,30,30,0.2);
      display: grid;
      place-items: center;
      overflow: hidden;
      margin-bottom: 22px;
      flex-shrink: 0;
    }
    .logo-ring img {
      width: 72px; height: 72px;
      object-fit: contain;
      border-radius: 50%;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .dots {
      display: flex;
      gap: 20px;
      margin-bottom: 36px;
    }
    .dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #cbd5e1;
      background: transparent;
      transition: all 0.15s ease;
    }
    .dot.filled {
      background: #ef4444;
      border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239,68,68,0.45);
    }
    .dot.error {
      background: #fca5a5;
      border-color: #fca5a5;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 14px;
      justify-content: center;
    }

    .key {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.55rem;
      font-weight: 500;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.1s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .key:active {
      transform: scale(0.86);
      background: #1e293b;
    }
    .key.ghost {
      background: transparent;
      color: #64748b;
      font-size: 0.82rem;
    }
    .key.ghost:active {
      background: rgba(0,0,0,0.06);
    }

    .footer {
      margin-top: 24px;
      font-size: 0.7rem;
      color: #94a3b8;
      letter-spacing: 0.05em;
      text-align: center;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      40%     { transform: translateX(10px); }
      60%     { transform: translateX(-7px); }
      80%     { transform: translateX(7px); }
    }
    .dots.shake { animation: shake 0.38s ease; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">
      <img src="/icons/logo.jpeg" alt="FGSB Logo">
    </div>
    <div class="title">Welcome back</div>
    <div class="subtitle">Enter your 4-digit PIN to continue</div>

    <div class="dots" id="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="pad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key ghost" id="btn-clear">Clear</button>
      <button class="key" data-n="0">0</button>
      <button class="key ghost" id="btn-back">&#x232B;</button>
    </div>

    <div class="footer">FGSB Admin Panel &middot; Secured Access</div>
  </div>

  <script>
    const PIN = '9050';
    let val = '';

    function render() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < val.length);
      }
    }

    function wrong() {
      const dotsEl = document.getElementById('dots');
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('d' + i);
        d.classList.remove('filled');
        d.classList.add('error');
      }
      dotsEl.classList.add('shake');
      setTimeout(() => {
        dotsEl.classList.remove('shake');
        for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.remove('error');
        val = '';
        render();
      }, 400);
    }

    function press(n) {
      if (val.length >= 4) return;
      val += n;
      render();
      if (val.length === 4) {
        if (val === PIN) {
          setTimeout(() => { window.location.href = '/admin.html'; }, 180);
        } else {
          setTimeout(wrong, 130);
        }
      }
    }

    document.querySelectorAll('.key[data-n]').forEach(btn => {
      btn.addEventListener('click', () => press(btn.dataset.n));
    });
    document.getElementById('btn-clear').addEventListener('click', () => { val = ''; render(); });
    document.getElementById('btn-back').addEventListener('click', () => { val = val.slice(0, -1); render(); });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') press(e.key);
      else if (e.key === 'Backspace') { val = val.slice(0, -1); render(); }
      else if (e.key === 'Escape') { val = ''; render(); }
    });
  </script>
</body>
</html>
